<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>Cadastro de Funcionários</h1>

        <div class="formulario">
            <input type="text" id="nome" placeholder="Nome">
            <input type="email" id="email" placeholder="E-mail">
            <input type="text" id="cargo" placeholder="Cargo">
            <input type="text" id="departamento" placeholder="Departamento">
            <input type="password" id="senha" placeholder="Senha">

            <button id="btnCadastrar">
                Cadastrar Funcionário
            </button>

        </div>

        <div id="totalFuncionarios">
            Total de funcionários: 0
        </div>

        <div id="listaFuncionarios" class="cards">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
